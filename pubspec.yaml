name: batti_nala
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  flutter_native_splash: ^2.4.7
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^10.0.0
  font_awesome_flutter: ^10.12.0
  geolocator: ^14.0.2
  go_router: ^17.1.0
  google_ml_kit: ^0.21.0
  google_mlkit_image_labeling: ^0.14.2
  google_mlkit_object_detection: ^0.15.1
  image: ^4.8.0
  image_picker: ^1.2.1
  latlong2: ^0.9.0
  path: ^1.9.1
  path_provider: ^2.1.5
  shimmer: ^3.0.0

flutter_native_splash:
  # The color of the splash screen background
  color: "#310061"

  # The path to your logo image
  image: assets/icons/battinala.png

  # Scaling and placement
  android_12:
    image: assets/icons/battinala.png
    color: "#310061"
    icon_background_color: "#310061"

  fullscreen: true

  # Ensures the icon is centered correctly on all screen sizes
  android: true
  ios: true
  web: false

dev_dependencies:
  flutter_launcher_icons: "^0.14.4"
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: assets/icons/battinala_logo.png
  min_sdk_android: 21

  # Adaptive Icon settings for modern Android
  adaptive_icon_background: "#310061"
  adaptive_icon_foreground: assets/icons/battinala_logo.png

  web:
    generate: true
    image_path: assets/icons/battinala_logo.png
    background_color: "#310061"
    theme_color: "#1E3A8A"

  windows:
    generate: true
    image_path: assets/icons/battinala_logo.png
    icon_size: 48

  macos:
    generate: true
    image_path: assets/icons/battinala_logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
