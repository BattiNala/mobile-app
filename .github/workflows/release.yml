name: Flutter Build (Android APK + iOS)

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.29.0"

jobs:
  android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Pub + Dart Tool
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  ios:
    name: Build iOS (no codesign)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache Pub + Dart Tool
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Flutter pub get
        run: flutter pub get

      # FIX 1: Replace AppDelegate with correct version
      - name: Fix AppDelegate
        run: |
          cat > ios/Runner/AppDelegate.swift << 'EOF'
          import UIKit
          import Flutter

          @UIApplicationMain
          @objc class AppDelegate: FlutterAppDelegate {
            override func application(
              _ application: UIApplication,
              didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
            ) -> Bool {
              GeneratedPluginRegistrant.register(with: self)
              return super.application(application, didFinishLaunchingWithOptions: launchOptions)
            }
          }
          EOF

      # FIX 2: Clean iOS build artifacts
      - name: Clean iOS build
        run: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData
          cd ..

      # FIX 3: Create fresh Podfile
      - name: Create Podfile
        run: |
          cat > ios/Podfile << 'EOF'
          platform :ios, '12.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['SWIFT_VERSION'] = '5.0'
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '12.0'
              end
            end
          end
          EOF

      # FIX 4: Install CocoaPods
      - name: Install CocoaPods
        run: gem install cocoapods

      # FIX 5: Pod install with repo update
      - name: Pod Install
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # FIX 6: Verify AppDelegate
      - name: Verify AppDelegate
        run: |
          if grep -q "FlutterImplicitEngineDelegate" ios/Runner/AppDelegate.swift; then
            echo "❌ ERROR: AppDelegate still has old code"
            exit 1
          else
            echo "✅ AppDelegate is correct"
          fi

      # FIX 7: Build iOS
      - name: Build iOS (release, no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [android, ios]
    if: always()

    steps:
      - name: Send Discord Embed
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          ANDROID: ${{ needs.android.result }}
          IOS: ${{ needs.ios.result }}
        run: |
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          ARTIFACTS_URL="${RUN_URL}#artifacts"

          if [[ "$ANDROID" == "success" && "$IOS" == "success" ]]; then
            STATUS="✅ SUCCESS"
            COLOR=5763719
          else
            STATUS="❌ FAILED"
            COLOR=15548997
          fi

          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "Flutter CI — ${STATUS}",
              "url": "${RUN_URL}",
              "color": ${COLOR},
              "fields": [
                { "name": "Repository", "value": "${REPO}", "inline": true },
                { "name": "Branch", "value": "${BRANCH}", "inline": true },
                { "name": "Triggered by", "value": "${ACTOR}", "inline": true },
                { "name": "Android", "value": "${ANDROID}", "inline": true },
                { "name": "iOS", "value": "${IOS}", "inline": true },
                {
                  "name": "Artifacts",
                  "value": "• Android APK\\n• iOS build folder\\n\\n🔗 ${ARTIFACTS_URL}",
                  "inline": false
                }
              ]
            }]
          }
          EOF
          )

          curl -s -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL"
